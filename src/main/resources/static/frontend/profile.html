<!doctype html>
<html lang="en" data-bs-theme="light">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Profile • Smart Result Analysis</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css" rel="stylesheet">
    <link href="/frontend/assets/css/app.css" rel="stylesheet">
  </head>
  <body class="app-bg">
    <div class="sidebar-backdrop"></div>
    <div class="app-shell">
      <aside class="app-sidebar glass d-flex flex-column">
        <div class="d-flex align-items-center justify-content-between mb-2">
          <div class="d-flex align-items-center gap-3">
            <div class="brand-mark"><i class="fa-regular fa-user"></i></div>
            <div class="lh-sm">
              <div class="fw-bold">Smart Result</div>
              <div class="small opacity-75">Profile</div>
            </div>
          </div>
          <button class="btn btn-sm btn-outline-secondary d-lg-none" type="button" data-sidebar-close>
            <i class="fa-solid fa-xmark"></i>
          </button>
        </div>

        <div class="sidebar-group-title">Pages</div>
        <nav class="d-grid gap-1">
          <a class="sidebar-link" href="/frontend/student-dashboard.html"><i class="fa-solid fa-user-graduate"></i> Student</a>
          <a class="sidebar-link" href="/frontend/faculty-dashboard.html"><i class="fa-solid fa-chalkboard-user"></i> Faculty</a>
          <a class="sidebar-link" href="/frontend/admin-dashboard.html"><i class="fa-solid fa-user-shield"></i> Admin</a>
          <a class="sidebar-link" href="/frontend/result.html"><i class="fa-regular fa-file-lines"></i> Results</a>
          <a class="sidebar-link active" href="/frontend/profile.html"><i class="fa-regular fa-user"></i> Profile</a>
        </nav>

        <div class="mt-auto pt-3">
          <button class="btn btn-outline-primary hover-lift w-100" type="button" data-theme-toggle>
            <i class="fa-solid fa-sun me-2" data-theme-icon></i>Toggle Theme
          </button>
        </div>
      </aside>

      <div class="app-content">
        <header class="app-topbar">
          <div class="container-fluid">
            <div class="d-flex align-items-center justify-content-between py-3 px-1">
              <div class="d-flex align-items-center gap-2">
                <button class="btn btn-outline-secondary d-lg-none" type="button" data-sidebar-open>
                  <i class="fa-solid fa-bars"></i>
                </button>
                <div>
                  <div class="fw-bold">Profile</div>
                  <div class="small text-body-secondary">View & update personal information</div>
                </div>
              </div>
              <a class="btn btn-outline-danger hover-lift" href="/frontend/login.html">
                <i class="fa-solid fa-right-from-bracket me-2"></i>Logout
              </a>
            </div>
          </div>
        </header>

        <main class="page-wrap">
          <div class="container-fluid">
            <div class="row g-3 fade-up">
              <div class="col-12 col-lg-4">
                <div class="card card-soft hover-lift">
                  <div class="card-body text-center">
                    <div class="mx-auto mb-3" style="width:88px;height:88px;border-radius:28px;background:linear-gradient(135deg,#0d6efd,#20c997);display:grid;place-items:center;color:#fff;font-size:34px;box-shadow:0 18px 34px rgba(13,110,253,.18);">
                      <i class="fa-solid fa-user"></i>
                    </div>
                    <div class="fw-bold fs-5">Aarav Patel</div>
                    <div class="text-body-secondary small">aarav@student.edu</div>
                    <div class="d-flex justify-content-center gap-2 mt-3 flex-wrap">
                      <span class="badge text-bg-primary rounded-pill">STUDENT</span>
                      <span class="badge text-bg-success rounded-pill">Sem 6</span>
                      <span class="badge text-bg-secondary rounded-pill">CSE</span>
                    </div>
                  </div>
                </div>
              </div>

              <div class="col-12 col-lg-8">
                <div class="card card-soft hover-lift">
                  <div class="card-body">
                    <div class="d-flex align-items-center justify-content-between">
                      <div>
                        <div class="fw-semibold">Account details</div>
                        <div class="small text-body-secondary">Update profile information (demo UI)</div>
                      </div>
                      <span class="badge text-bg-primary rounded-pill">Secure</span>
                    </div>
                    <form class="mt-3">
                      <div class="row g-2">
                        <div class="col-12 col-md-6">
                          <label class="form-label small">Full name</label>
                          <input class="form-control" value="Aarav Patel">
                        </div>
                        <div class="col-12 col-md-6">
                          <label class="form-label small">Email</label>
                          <input class="form-control" value="aarav@student.edu" disabled>
                        </div>
                        <div class="col-12 col-md-6">
                          <label class="form-label small">Phone</label>
                          <input class="form-control" placeholder="+91 9xxxx xxxxx">
                        </div>
                        <div class="col-12 col-md-6">
                          <label class="form-label small">Department</label>
                          <input class="form-control" value="Computer Science">
                        </div>
                        <div class="col-12">
                          <label class="form-label small">Address</label>
                          <input class="form-control" placeholder="City, State">
                        </div>
                        <div class="col-12 d-grid d-md-flex gap-2 mt-2">
                          <button class="btn btn-primary btn-glow hover-lift" type="button">
                            <i class="fa-solid fa-floppy-disk me-2"></i>Save changes
                          </button>
                          <button class="btn btn-outline-secondary hover-lift" type="button">
                            <i class="fa-solid fa-key me-2"></i>Change password
                          </button>
                        </div>
                      </div>
                    </form>
                    <div class="alert alert-info mt-3 mb-0 small">
                      Backend JWT + BCrypt will secure profile update APIs.
                    </div>
                  </div>
                </div>
              </div>
            </div>
          </div>
        </main>
      </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
    <script src="/frontend/assets/js/app.js"></script>
    <script>
      document.addEventListener("DOMContentLoaded", () => {
        window.SRADS?.auth?.guard?.(["STUDENT","FACULTY","ADMIN"]);
      });
    </script>
  </body>
</html>
